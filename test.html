<!DOCTYPE html>
<html>
<head>
    <title>Iframe Test</title>
    <style>
        body {
            font-family: Arial;
            padding: 20px;
        }

        iframe {
            width: 100%;
            height: 300px;
            border: 2px solid black;
        }

        button {
            margin: 5px;
        }

        pre {
            background: #f4f4f4;
            padding: 10px;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>

<h2>Iframe Test Page</h2>

<button onclick="run()">Run Checks</button>

<iframe id="frame" src="https://example.com"></iframe>

<pre id="out"></pre>

<script>
function log(msg){
    document.getElementById("out").textContent += msg + "\n";
}

function run(){

    const out = document.getElementById("out");
    out.textContent = "";

    const frame = document.getElementById("frame");

    log("=== PARENT INFO ===");
    log("url: " + location.href);
    log("origin: " + location.origin);
    log("iframe (self): " + (window !== window.top));

    log("\n=== IFRAME INFO ===");

    log("iframe src: " + frame.src);

    try {
        log("iframe contentWindow exists: " + !!frame.contentWindow);
    } catch (e) {
        log("iframe access blocked: " + e.message);
    }

    log("\nNOTE:");
    log("- You cannot access iframe cookies/localStorage if cross-origin");
    log("- example.com is isolated by browser security");
    log("- iframe is only for display unless same-origin");

}

// message listener (if iframe ever sends anything)
window.addEventListener("message", (e) => {
    log("message from iframe: " + JSON.stringify(e.data));
});
</script>

</body>
</html>
