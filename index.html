<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>New Tab</title>
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html, body {
  width:100%; height:100%;
  overflow:hidden;
  font-family: arial, sans-serif;
}
body { display:flex; flex-direction:column; min-height:100vh; }

/* ── BACKGROUND ── */
#bg-layer {
  position:fixed; inset:0; z-index:0;
  background-size:cover; background-position:center; background-repeat:no-repeat;
  transition:background-image 0.4s;
}
body.no-bg #bg-layer { display:none; }

/* ── CSS CHECKBOX TRICK ── */
#apps-toggle { display:none; }

/* ── TOP NAV ── */
#topnav {
  position:fixed; top:0; right:0;
  display:flex; align-items:center;
  padding:12px 14px; z-index:20;
}
.tnav-link {
  font-size:13px; color:#fff; text-decoration:none;
  padding:6px 8px; border-radius:4px;
}
.tnav-link:hover { text-decoration:underline; }

.tnav-icon-label {
  width:40px; height:40px; border-radius:50%;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:#fff; user-select:none; transition:background 0.15s;
}
.tnav-icon-label:hover { background:rgba(255,255,255,0.15); }
#apps-toggle:checked ~ #topnav .tnav-icon-label { background:rgba(255,255,255,0.2); }

.tnav-pfp {
  width:32px; height:32px; border-radius:50%;
  overflow:hidden; margin-left:4px; cursor:pointer; display:block;
}
.tnav-pfp img { width:100%; height:100%; object-fit:cover; display:block; }

/* ── OVERLAY ── */
.apps-overlay { display:none; position:fixed; inset:0; z-index:90; }
#apps-toggle:checked ~ .apps-overlay { display:block; }

/* ── APPS DROPDOWN ── */
.appdrop {
  display:none; position:fixed; top:56px; right:10px;
  background:#fff; border-radius:20px;
  box-shadow: 0 2px 6px rgba(0,0,0,.12), 0 8px 24px rgba(0,0,0,.14);
  width:300px; z-index:100;
  flex-direction:column;
  font-family:'Google Sans',Roboto,arial,sans-serif;
  overflow:hidden;
  animation:dropIn 0.18s cubic-bezier(.4,0,.2,1);
  max-height:calc(100vh - 70px);
  overflow-y:auto;
}
#apps-toggle:checked ~ .appdrop { display:flex; }

@keyframes dropIn {
  from { opacity:0; transform:translateY(-8px) scale(0.97); }
  to   { opacity:1; transform:translateY(0) scale(1); }
}

.appdrop-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:16px 14px 10px 18px;
  border-bottom:1px solid #f1f3f4;
  position:sticky; top:0; background:#fff; z-index:2;
}
.appdrop-title { font-size:14px; font-weight:500; color:#202124; letter-spacing:0.01em; }

.appdrop-edit-btn {
  width:32px; height:32px; border-radius:50%; border:none;
  background:#f1f3f4; cursor:pointer;
  display:flex; align-items:center; justify-content:center; color:#5f6368;
  transition:background 0.12s;
}
.appdrop-edit-btn:hover { background:#e8eaed; }
.appdrop-edit-btn.active { background:#e8f0fe; color:#1a73e8; }

/* 3-column grid */
.appdrop-section {
  display:grid; grid-template-columns:repeat(3,1fr);
  padding:10px 6px 6px;
  gap:2px;
}

.appdrop-divider { height:1px; background:#f1f3f4; margin:4px 14px 0; }

.appdrop-section-label {
  font-size:11px; color:#9aa0a6; font-weight:500;
  letter-spacing:0.04em; text-transform:uppercase;
  padding:8px 18px 0;
}

.app-item-wrap { position:relative; border-radius:14px; }

.applink {
  display:flex; flex-direction:column; align-items:center;
  gap:5px; padding:8px 4px 10px;
  border-radius:14px; text-decoration:none; color:#3c4043;
  font-size:11px; font-family:'Google Sans',Roboto,arial,sans-serif;
  font-weight:400; transition:background 0.12s;
  width:100%; text-align:center;
}
.applink:hover { background:#f1f3f4; }

.appico {
  width:54px; height:54px; border-radius:50%;
  background:#f8f9fa; border:1px solid #e8eaed;
  display:flex; align-items:center; justify-content:center;
  overflow:hidden; flex-shrink:0;
}
.appico img { width:30px; height:30px; object-fit:contain; border-radius:3px; }

.app-del-corner {
  display:none;
  position:absolute; top:2px; right:2px;
  width:20px; height:20px; border-radius:50%;
  background:#c5221f; color:#fff;
  border:2px solid #fff;
  cursor:pointer; z-index:5;
  align-items:center; justify-content:center;
  box-shadow:0 1px 4px rgba(0,0,0,.25);
  transition:background 0.12s, transform 0.1s;
  padding:0; line-height:1;
}
.app-del-corner:hover { background:#a50e0e; transform:scale(1.1); }
.edit-mode .app-del-corner { display:flex; }

.add-app-btn {
  display:none; align-items:center; justify-content:center;
  gap:4px; padding:8px 4px 10px;
  border-radius:14px; border:1.5px dashed #dadce0;
  background:none; cursor:pointer; color:#9aa0a6;
  font-size:11px; font-family:'Google Sans',Roboto,arial,sans-serif;
  flex-direction:column; width:100%;
  transition:background 0.12s, border-color 0.12s;
}
.add-app-btn:hover { background:#f8f9fa; border-color:#bdc1c6; color:#5f6368; }
.edit-mode .add-app-btn { display:flex; }

.appdrop-more {
  display:block; text-align:center; padding:8px 0 12px;
  font-size:12.5px; color:#1a73e8; text-decoration:none;
  font-family:'Google Sans',Roboto,arial,sans-serif; font-weight:500;
}
.appdrop-more:hover { text-decoration:underline; }

/* ── MODALS ── */
.modal-backdrop {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.4); z-index:500;
  align-items:center; justify-content:center;
}
.modal-backdrop.open { display:flex; }

.modal {
  background:#fff; border-radius:24px;
  padding:28px 28px 20px;
  width:360px; max-width:calc(100vw - 32px);
  box-shadow:0 8px 40px rgba(0,0,0,.25);
  animation:modalIn 0.18s cubic-bezier(.4,0,.2,1);
}
@keyframes modalIn {
  from { opacity:0; transform:scale(0.94); }
  to   { opacity:1; transform:scale(1); }
}

.modal-title {
  font-size:18px; font-weight:500; color:#202124;
  font-family:'Google Sans',Roboto,arial,sans-serif;
  margin-bottom:20px;
}
.modal-field { margin-bottom:14px; }
.modal-field label {
  display:block; font-size:12px; color:#5f6368;
  font-family:'Google Sans',Roboto,arial,sans-serif;
  margin-bottom:5px; font-weight:500; letter-spacing:0.03em;
}
.modal-field input[type="text"], .modal-field input[type="url"] {
  width:100%; padding:10px 14px; border-radius:10px;
  border:1.5px solid #dadce0; font-size:14px; color:#202124;
  font-family:arial,sans-serif; outline:none; transition:border 0.15s; background:#fff;
}
.modal-field input:focus { border-color:#1a73e8; }

.modal-toggle-row {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:20px;
}
.modal-toggle-label { font-size:13px; color:#202124; font-family:'Google Sans',Roboto,arial,sans-serif; }

.toggle-switch { position:relative; width:44px; height:24px; }
.toggle-switch input { display:none; }
.toggle-track { position:absolute; inset:0; border-radius:12px; background:#dadce0; cursor:pointer; transition:background 0.2s; }
.toggle-switch input:checked + .toggle-track { background:#1a73e8; }
.toggle-thumb { position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:#fff; pointer-events:none; box-shadow:0 1px 3px rgba(0,0,0,.3); transition:transform 0.2s; }
.toggle-switch input:checked ~ .toggle-thumb { transform:translateX(20px); }

.modal-preview { display:flex; align-items:center; gap:12px; padding:10px 14px; border-radius:12px; background:#f8f9fa; margin-bottom:18px; }
.modal-preview .appico { width:36px; height:36px; flex-shrink:0; }
.modal-preview .appico img { width:20px; height:20px; }
.modal-preview-name { font-size:13px; color:#202124; font-family:'Google Sans',Roboto,arial,sans-serif; }

.modal-btns { display:flex; justify-content:flex-end; gap:10px; }
.modal-btn { padding:9px 20px; border-radius:10px; border:none; font-size:14px; font-family:'Google Sans',Roboto,arial,sans-serif; font-weight:500; cursor:pointer; transition:background 0.12s; }
.modal-btn.cancel { background:#f1f3f4; color:#444; }
.modal-btn.cancel:hover { background:#e8eaed; }
.modal-btn.save { background:#1a73e8; color:#fff; }
.modal-btn.save:hover { background:#1765cc; }
.modal-btn.delete { background:#fce8e6; color:#c5221f; margin-right:auto; }
.modal-btn.delete:hover { background:#f5c6c2; }

/* ── MAIN ── */
#main {
  flex:1; display:flex; flex-direction:column;
  align-items:center; padding-top:14vh;
  position:relative; z-index:1;
}
.glogo { width:272px; margin-bottom:28px; cursor:default; }

.sbar-wrap { width:582px; max-width:calc(100vw - 48px); }

.sbar {
  width:100%; height:44px; background:#fff; border:none;
  border-radius:24px; display:flex; align-items:center;
  padding:0 6px 0 12px; gap:8px;
  box-shadow:0 1px 6px rgba(0,0,0,.22), 0 2px 10px rgba(0,0,0,.12);
  transition:box-shadow 0.15s;
}
.sbar:hover, .sbar:focus-within {
  box-shadow:0 1px 12px rgba(0,0,0,.32), 0 2px 14px rgba(0,0,0,.16);
}

.s-submit {
  width:32px; height:32px; border-radius:50%; border:none;
  background:transparent; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:#9aa0a6; flex-shrink:0; padding:0;
}
.s-submit:hover { background:rgba(0,0,0,.06); color:#5f6368; }

#q {
  flex:1; border:none; outline:none; font-size:16px;
  color:#202124; background:transparent; caret-color:#202124; min-width:0;
}
#q::placeholder { color:#9aa0a6; font-size:14px; font-weight:300; }

.s-actions { display:flex; align-items:center; flex-shrink:0; }

/* AI Mode — equal padding all sides */
.ai-btn {
  display:inline-flex; align-items:center; gap:5px;
  padding:7px 7px 7px 7px;
  border-radius:20px; border:none;
  background:#e9eaed;
  font-size:13px; color:#202124;
  cursor:pointer; white-space:nowrap;
  font-family:'Google Sans',Roboto,arial,sans-serif;
  font-weight:500; text-decoration:none;
  transition:background 0.15s; flex-shrink:0; line-height:1;
}
.ai-btn:hover { background:#dfe0e4; }
.ai-btn-text { padding-right:3px; }

/* ── BOTTOM BAR ── */
#bottom-bar {
  position:fixed; bottom:0; left:0; right:0;
  display:flex; align-items:flex-end; justify-content:space-between;
  padding:10px 14px 14px; z-index:10; pointer-events:none;
}

#photocredit {
  display:flex; align-items:center; gap:5px; pointer-events:all;
}
#photocredit svg { color:rgba(255,255,255,0.75); }
#photocredit a { font-size:11px; color:rgba(255,255,255,0.8); text-decoration:none; }
#photocredit a:hover { color:#fff; text-decoration:underline; }
body.no-bg #photocredit { visibility:hidden; }

#customize-btn {
  pointer-events:all;
  width:36px; height:36px; border-radius:50%;
  background:rgba(0,0,0,0.35); border:none; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  color:rgba(255,255,255,0.9);
  backdrop-filter:blur(4px);
  transition:background 0.15s, transform 0.15s;
  box-shadow:0 2px 8px rgba(0,0,0,.2);
}
#customize-btn:hover { background:rgba(0,0,0,0.5); transform:scale(1.06); }
body.no-bg #customize-btn {
  background:rgba(0,0,0,0.1); color:#5f6368;
  box-shadow:0 1px 4px rgba(0,0,0,.1);
}
body.no-bg #customize-btn:hover { background:rgba(0,0,0,0.16); }

/* ── BG PANEL ── */
#bg-panel-backdrop {
  display:none; position:fixed; inset:0;
  background:rgba(0,0,0,0.3); z-index:400;
  align-items:flex-end; justify-content:center;
  padding-bottom:62px;
}
#bg-panel-backdrop.open { display:flex; }

#bg-panel {
  background:#fff; border-radius:20px;
  padding:18px 18px 16px;
  width:500px; max-width:calc(100vw - 24px);
  box-shadow:0 8px 40px rgba(0,0,0,.28);
  animation:modalIn 0.18s cubic-bezier(.4,0,.2,1);
  font-family:'Google Sans',Roboto,arial,sans-serif;
}

.bg-panel-header {
  display:flex; align-items:center; justify-content:space-between;
  margin-bottom:14px;
}
.bg-panel-title { font-size:14px; font-weight:500; color:#202124; }
.bg-panel-close {
  width:28px; height:28px; border-radius:50%; border:none;
  background:#f1f3f4; cursor:pointer; color:#5f6368;
  display:flex; align-items:center; justify-content:center;
  transition:background 0.12s;
}
.bg-panel-close:hover { background:#e8eaed; }

.bg-options {
  display:flex; gap:8px; flex-wrap:wrap; align-items:flex-start;
  margin-bottom:12px;
}

.bg-opt {
  position:relative; cursor:pointer; border-radius:10px;
  overflow:visible; flex-shrink:0;
  border:2.5px solid transparent;
  transition:border-color 0.15s, transform 0.12s;
}
.bg-opt:hover { transform:scale(1.04); }
.bg-opt.selected { border-color:#1a73e8; }
.bg-opt.selected::after {
  content:'✓';
  position:absolute; top:-6px; right:-6px;
  width:18px; height:18px; border-radius:50%;
  background:#1a73e8; color:#fff;
  font-size:10px; font-weight:700;
  display:flex; align-items:center; justify-content:center;
  line-height:18px; text-align:center;
  z-index:2;
}

.bg-opt-inner {
  width:70px; height:48px; border-radius:8px; overflow:hidden;
  display:flex; align-items:center; justify-content:center; flex-direction:column; gap:3px;
}

.bg-opt-none .bg-opt-inner {
  background: repeating-conic-gradient(#e8eaed 0% 25%, #fff 0% 50%) 0 0 / 10px 10px;
}
.bg-opt-none-label { font-size:10px; color:#5f6368; font-weight:500; }

.bg-opt-img .bg-opt-inner img {
  width:100%; height:100%; object-fit:cover; display:block;
}

.bg-opt-upload .bg-opt-inner {
  background:#f1f3f4;
}
.bg-opt-upload-label { font-size:10px; color:#5f6368; font-weight:500; }

/* daily refresh */
.bg-daily-row {
  display:none; align-items:center; justify-content:space-between;
  padding:10px 12px; background:#f8f9fa; border-radius:10px;
}
.bg-daily-row.visible { display:flex; }
.bg-daily-label { font-size:13px; color:#202124; }
.bg-daily-sub { font-size:11px; color:#9aa0a6; margin-top:1px; }

#bg-file-input { display:none; }
</style>
</head>

      <div class="bg-opt bg-opt-upload" id="bgopt-upload" data-type="upload">
        <div class="bg-opt-inner">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="#5f6368">
            <path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/>
          </svg>
          <div class="bg-opt-upload-label">Upload</div>
        </div>

    <div class="bg-daily-row" id="bg-daily-row">

        <div class="bg-daily-label">Refresh daily</div>

      <label class="toggle-switch">
        <input type="checkbox" id="bg-daily-toggle">
        <div class="toggle-track"></div>
        <div class="toggle-thumb"></div>
      </label>

</div>

<input type="file" id="bg-file-input" accept="image/*,.gif">

<!-- MAIN -->
<main id="main">
  <svg class="glogo" viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg" aria-label="Google">
    <path fill="#fff" d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>

    <path fill="#fff" d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.67-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.61h9.26zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"/>

<script>
const NATURE_URLS = [
  'https://lh5.googleusercontent.com/proxy/YlTm0oFdqY2F4qXyhdun8WSyVIstn5cICXd_eWXXu0hihdEagV1bnvtkNp-XKNF5oyw3XvhknLlSQv9Z0OUw5_Y-y00dOrLs9N7GNqfn6--x=w3840-h2160-p-k-no-nd-mv',
  'https://lh6.googleusercontent.com/proxy/6bwfw7G3s6z6tMlUomuQLiTy3UlyEFVeYkS_dxHejBYtZ0qAKCg4JR7BIktep6ppSQvigLdNLY1aSSVXzlBhpvpt3sqf9e16LmfStZig0CcV=w3840-h2160-p-k-no-nd-mv',
  'https://lh3.googleusercontent.com/proxy/3EnTIe8unY7R83kivrdseZAKyxWp0UOwzpJidrBwyDimvH2o6Lcta5e5Eo9ZC17Rto6Ks8vxRaTyQc3ESkAjFQPYbHr9RJn3LDzFf6UgiFKS=w3840-h2160-p-k-no-nd-mv',
  'https://lh4.googleusercontent.com/proxy/kFIJNnm2DMbS3B5LXaIdm2JKI6twGWwmzQbcJCfqTfuaH_ULD50v1Z3BGPEF32xTPRvgGLx492zcy_kcatCde2wmz-9ZYFqifbJRMl2DzyE=w3840-h2160-p-k-no-nd-mv'
];

const DEFAULTS = {
  favorites: [
    { name:'Account',   url:'https://myaccount.google.com/',  icon:'', topTarget:false },
    { name:'Gmail',     url:'https://mail.google.com',         icon:'', topTarget:false },
    { name:'Drive',     url:'https://drive.google.com',        icon:'', topTarget:false },
    { name:'Classroom', url:'https://classroom.google.com',    icon:'', topTarget:false },
    { name:'Docs',      url:'https://docs.google.com',         icon:'', topTarget:false },
    { name:'Sheets',    url:'https://sheets.google.com',       icon:'', topTarget:false },
    { name:'Slides',    url:'https://slides.google.com',       icon:'', topTarget:false },
    { name:'Calendar',  url:'https://calendar.google.com',     icon:'', topTarget:false },
    { name:'Meet',      url:'https://meet.google.com',         icon:'', topTarget:false },
  ],
  mysites: [
    { name:'AZ Games',     url:'https://azgames.io',           icon:'', topTarget:false },
    { name:'Zap Games',    url:'https://zapgames.io',          icon:'', topTarget:false },
    { name:'Learn Coding', url:'https://learncodingdaily.com', icon:'', topTarget:false },
  ]
};

// ── BG CONFIG ──
function loadBgConfig() {
  try { const r = localStorage.getItem('newtab_bg'); if (r) return JSON.parse(r); } catch(e) {}
  return { type:'none', natureIdx:0, dailyRefresh:false, lastDate:'' };
}
function saveBgConfig(cfg) {
  try { localStorage.setItem('newtab_bg', JSON.stringify({ type:cfg.type, natureIdx:cfg.natureIdx, dailyRefresh:cfg.dailyRefresh, lastDate:cfg.lastDate })); } catch(e) {}
}
function loadUploadUrl() { try { return localStorage.getItem('newtab_bg_upload') || ''; } catch(e) { return ''; } }
function saveUploadUrl(u) { try { localStorage.setItem('newtab_bg_upload', u); } catch(e) {} }

let bgConfig = loadBgConfig();
bgConfig.uploadUrl = loadUploadUrl();

function todayStr() { const d = new Date(); return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`; }

function applyDailyRefresh() {
  if (bgConfig.type === 'nature' && bgConfig.dailyRefresh) {
    const today = todayStr();
    if (bgConfig.lastDate !== today) {
      bgConfig.natureIdx = (bgConfig.natureIdx + 1) % NATURE_URLS.length;
      bgConfig.lastDate = today;
      saveBgConfig(bgConfig);
    }
  }
}

function applyBackground() {
  const layer = document.getElementById('bg-layer');
  if (bgConfig.type === 'none') {
    document.body.classList.add('no-bg');
    layer.style.backgroundImage = '';
  } else if (bgConfig.type === 'nature') {
    document.body.classList.remove('no-bg');
    layer.style.backgroundImage = `url('${NATURE_URLS[bgConfig.natureIdx]}')`;
  } else if (bgConfig.type === 'upload' && bgConfig.uploadUrl) {
    document.body.classList.remove('no-bg');
    layer.style.backgroundImage = `url('${bgConfig.uploadUrl}')`;
  } else {
    document.body.classList.add('no-bg');
    layer.style.backgroundImage = '';
  }
}

// ── BG PANEL ──
const bgPanelBackdrop = document.getElementById('bg-panel-backdrop');

function openBgPanel() { syncBgPanelUI(); bgPanelBackdrop.classList.add('open'); }
function closeBgPanel() { bgPanelBackdrop.classList.remove('open'); }

function syncBgPanelUI() {
  document.querySelectorAll('.bg-opt').forEach(el => el.classList.remove('selected'));
  if (bgConfig.type === 'none') {
    document.getElementById('bgopt-none').classList.add('selected');
  } else if (bgConfig.type === 'nature') {
    document.querySelectorAll('.bg-opt[data-type="nature"]').forEach(opt => {
      if (parseInt(opt.dataset.idx) === bgConfig.natureIdx) opt.classList.add('selected');
    });
  } else if (bgConfig.type === 'upload') {
    document.getElementById('bgopt-upload').classList.add('selected');
  }
  const daily = document.getElementById('bg-daily-row');
  daily.classList.toggle('visible', bgConfig.type === 'nature');
  document.getElementById('bg-daily-toggle').checked = bgConfig.dailyRefresh;
}

document.querySelectorAll('.bg-opt').forEach(opt => {
  opt.addEventListener('click', () => {
    const type = opt.dataset.type;
    if (type === 'upload') { document.getElementById('bg-file-input').click(); return; }
    if (type === 'none') {
      bgConfig.type = 'none';
    } else if (type === 'nature') {
      bgConfig.type = 'nature';
      bgConfig.natureIdx = parseInt(opt.dataset.idx);
      bgConfig.lastDate = todayStr();
    }
    saveBgConfig(bgConfig); applyBackground(); syncBgPanelUI();
  });
});

document.getElementById('bg-file-input').addEventListener('change', function() {
  const file = this.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    bgConfig.type = 'upload';
    bgConfig.uploadUrl = e.target.result;
    saveUploadUrl(e.target.result);
    saveBgConfig(bgConfig); applyBackground(); syncBgPanelUI();
  };
  reader.readAsDataURL(file);
  this.value = '';
});

document.getElementById('bg-daily-toggle').addEventListener('change', function() {
  bgConfig.dailyRefresh = this.checked;
  if (bgConfig.dailyRefresh) bgConfig.lastDate = '';
  saveBgConfig(bgConfig);
});

document.getElementById('customize-btn').addEventListener('click', openBgPanel);
document.getElementById('bg-panel-close').addEventListener('click', closeBgPanel);
bgPanelBackdrop.addEventListener('click', e => { if (e.target === bgPanelBackdrop) closeBgPanel(); });

// ── APP DATA ──
function loadData() {
  try { const r = localStorage.getItem('newtab_apps'); if (r) return JSON.parse(r); } catch(e) {}
  return JSON.parse(JSON.stringify(DEFAULTS));
}
function saveData(d) { try { localStorage.setItem('newtab_apps', JSON.stringify(d)); } catch(e) {} }
function getFavicon(url, customIcon) {
  if (customIcon && customIcon.trim()) return customIcon.trim();
  try { return `https://www.google.com/s2/favicons?domain=${new URL(url).hostname}&sz=64`; } catch(e) { return ''; }
}
function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

let appData = loadData();
let isEditMode = false;

function renderSection(sectionEl, items, key) {
  sectionEl.innerHTML = '';
  items.forEach((item, idx) => {
    const wrap = document.createElement('div');
    wrap.className = 'app-item-wrap';
    wrap.innerHTML = `
      <a class="applink" href="${escHtml(item.url)}" target="${item.topTarget?'_top':'_self'}">
        <div class="appico"><img src="${escHtml(getFavicon(item.url,item.icon))}" alt="" onerror="this.style.opacity='0'"></div>
        ${escHtml(item.name)}
      </a>
      <button class="app-del-corner" title="Remove">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>`;
    wrap.querySelector('.applink').addEventListener('click', e => {
      if (isEditMode) { e.preventDefault(); openModal(key, idx); }
    });
    wrap.querySelector('.app-del-corner').addEventListener('click', e => {
      e.stopPropagation();
      appData[key].splice(idx,1); saveData(appData); renderAll();
    });
    sectionEl.appendChild(wrap);
  });
  const addWrap = document.createElement('div');
  addWrap.className = 'app-item-wrap'; addWrap.style.display = 'contents';
  addWrap.innerHTML = `<button class="add-app-btn" data-section="${key}"><svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>Add</button>`;
  sectionEl.appendChild(addWrap);
  sectionEl.querySelector('.add-app-btn').addEventListener('click', e => { e.stopPropagation(); openModal(key, null); });
}

function renderAll() {
  renderSection(document.getElementById('section-favorites'), appData.favorites, 'favorites');
  renderSection(document.getElementById('section-mysites'), appData.mysites, 'mysites');
  document.getElementById('appdrop').classList.toggle('edit-mode', isEditMode);
}

document.getElementById('edit-toggle-btn').addEventListener('click', e => {
  e.stopPropagation(); isEditMode = !isEditMode;
  document.getElementById('edit-toggle-btn').classList.toggle('active', isEditMode);
  renderAll();
});

// ── MODAL ──
let modalSection=null, modalIdx=null;
function openModal(sec, idx) {
  modalSection=sec; modalIdx=idx;
  const isEdit = idx!==null;
  document.getElementById('modal-title').textContent = isEdit?'Edit shortcut':'Add shortcut';
  document.getElementById('modal-delete-btn').style.display = isEdit?'block':'none';
  if (isEdit) {
    const it = appData[sec][idx];
    document.getElementById('modal-name').value = it.name;
    document.getElementById('modal-url').value = it.url;
    document.getElementById('modal-icon').value = it.icon||'';
    document.getElementById('modal-toptarget').checked = !!it.topTarget;
    updatePreview(it.name, it.url, it.icon||'');
  } else {
    ['modal-name','modal-url','modal-icon'].forEach(id=>document.getElementById(id).value='');
    document.getElementById('modal-toptarget').checked=false;
    updatePreview('New shortcut','','');
  }
  document.getElementById('modal-backdrop').classList.add('open');
}
function closeModal() { document.getElementById('modal-backdrop').classList.remove('open'); modalSection=null; modalIdx=null; }
function updatePreview(name,url,icon) {
  document.getElementById('preview-name').textContent = name||'New shortcut';
  const img = document.getElementById('preview-img');
  img.src=getFavicon(url,icon); img.style.opacity='1';
  img.onerror=()=>{img.style.opacity='0';};
}
['modal-name','modal-url','modal-icon'].forEach(id=>{
  document.getElementById(id).addEventListener('input',()=>{
    updatePreview(document.getElementById('modal-name').value,document.getElementById('modal-url').value,document.getElementById('modal-icon').value);
  });
});
document.getElementById('modal-cancel-btn').addEventListener('click', closeModal);
document.getElementById('modal-backdrop').addEventListener('click', e=>{if(e.target===document.getElementById('modal-backdrop'))closeModal();});
document.getElementById('modal-delete-btn').addEventListener('click', ()=>{
  if(modalSection!==null&&modalIdx!==null){appData[modalSection].splice(modalIdx,1);saveData(appData);renderAll();}
  closeModal();
});
document.getElementById('modal-save-btn').addEventListener('click', ()=>{
  let url=document.getElementById('modal-url').value.trim();
  const name=document.getElementById('modal-name').value.trim()||url;
  const icon=document.getElementById('modal-icon').value.trim();
  const topTarget=document.getElementById('modal-toptarget').checked;
  if(!url){document.getElementById('modal-url').focus();return;}
  if(!url.startsWith('http'))url='https://'+url;
  const item={name:name||url,url,icon,topTarget};
  if(modalIdx!==null)appData[modalSection][modalIdx]=item;
  else appData[modalSection].push(item);
  saveData(appData);renderAll();closeModal();
});

// ── SEARCH ──
const qInput=document.getElementById('q');
function doSearch(){
  const v=qInput.value.trim(); if(!v)return;
  if(/^https?:\/\//i.test(v)){window.location.href=v;return;}
  if(/^www\./i.test(v)||(/\.[a-z]{2,}$/i.test(v)&&!v.includes(' '))){window.location.href='https://'+v;return;}
  window.location.href='https://www.google.com/search?q='+encodeURIComponent(v)+'&igu=1';
}
document.getElementById('s-submit').addEventListener('click',doSearch);
qInput.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});

// ── INIT ──
applyDailyRefresh();
applyBackground();
renderAll();
</script>
</body>
